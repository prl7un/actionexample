name: Docker Build and Push

# 언제 실행할지 결정 (main 브랜치에 push가 일어날 때)
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 저장소의 코드를 가져옴
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. 도커허브에 로그인
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 3. 이미지 빌드 후 도커허브로 푸시
    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # '아이디/이미지이름:태그' 형식입니다.
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-first-docker:latest