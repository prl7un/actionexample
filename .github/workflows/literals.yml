name: Literals
on: push
jobs:
  print:
    runs-on: ubuntu-latest
    steps:
      - run: printenv | grep 'LITERAL_'
        env:
          LITERAL_NULL: ${{ null }}   # nullнҳ•
          LITERAL_BOOLEAN: ${{ true }} # booleanнҳ•
          LITERAL_NUMBER: ${{ 1234 }} # numberнҳ•
          LITERAL_STRING: ${{ 'Hello' }} # stringнҳ•(мқјл°ҳм Ғмқё кё°лІ•)
          LITERAL_OMIT_STRING: World    # stringнҳ•(мғқлһө кё°лІ•)
          